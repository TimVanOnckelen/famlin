# Expo web preview in Docker — useful for testing the mobile UI in a browser
# without installing Node or Expo CLI locally.
#
# Run: docker compose -f docker-compose.mobile.yml up
# Open: http://localhost:8081
#
# Note: native features (push notifications, camera, Google OAuth) will not work
# in the web preview. Use EAS Build or a local Expo development build for full
# native testing.

services:
  famlin-mobile:
    image: node:20-alpine
    container_name: famlin-mobile
    working_dir: /app
    environment:
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-http://host.docker.internal:3000}
      EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${EXPO_PUBLIC_GOOGLE_CLIENT_ID:-}
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./mobile:/app
      - mobile-node-modules:/app/node_modules
    command: >
      sh -c "
        apk add --no-cache git &&
        npm install &&
        npx expo start --web --lan
      "

volumes:
  mobile-node-modules:
