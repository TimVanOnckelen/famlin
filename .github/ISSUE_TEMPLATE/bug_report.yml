name: Bug report
description: Report a problem with Famlin
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Where did this happen?
      options:
        - Mobile app (iOS)
        - Mobile app (Android)
        - Admin UI
        - Backend API
        - Docs site
        - Not sure
    validations:
      required: true
  - type: input
    id: deployment
    attributes:
      label: Deployment method
      description: How are you running Famlin?
      placeholder: e.g. Docker Compose on a Synology NAS, bare metal, EAS build, ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: App/backend version or git commit if known.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or attach screenshots. These will be formatted as code automatically.
      render: shell
    validations:
      required: false
