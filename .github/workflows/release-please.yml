name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Serialize runs on main so two rapid pushes can't race the release PR or
# double-publish an image. Don't cancel in-flight runs — a partial image
# push is worse than waiting.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .release-please-manifest.json

  # release-please creates the GitHub Release using the default GITHUB_TOKEN,
  # which does NOT trigger docker-publish.yml's `on: release` event (GitHub
  # suppresses workflow-triggered-workflow events to prevent recursion). So
  # the image build is chained here instead, in the same run, gated on
  # whether a release actually was created this time. The build itself lives
  # in docker-publish.yml (reused here so there's one source of truth).
  publish-docker:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}

  # Every release bumps mobile/package.json's `version` and mobile/app.json's
  # `version`/`buildNumber` via release-please's extra-files config (single
  # monorepo version), so those two files always show as "changed" between
  # tags even when no real mobile code changed. This job diffs against the
  # previous tag and ignores changes to just those version/buildNumber
  # fields, so a backend- or web-only release doesn't trigger a real EAS
  # store build + submission.
  mobile-changed:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for meaningful mobile changes since the previous release
        id: check
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found — building mobile to be safe."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES=$(git diff --name-only "$PREV_TAG" HEAD -- mobile packages/api-client)
          if [ -z "$CHANGED_FILES" ]; then
            echo "No files under mobile/ or packages/api-client/ changed since $PREV_TAG."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MEANINGFUL=false
          while IFS= read -r f; do
            case "$f" in
              mobile/package.json|mobile/app.json)
                REST=$(git diff "$PREV_TAG" HEAD -- "$f" \
                  | grep -E '^[+-]' \
                  | grep -v -E '^(\+\+\+|---)' \
                  | grep -v -E '"(version|buildNumber)":' || true)
                if [ -n "$REST" ]; then
                  echo "$f changed beyond version/buildNumber — meaningful."
                  MEANINGFUL=true
                fi
                ;;
              *)
                echo "$f changed — meaningful."
                MEANINGFUL=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          echo "changed=$MEANINGFUL" >> "$GITHUB_OUTPUT"

  # Same GITHUB_TOKEN suppression applies to mobile-build.yml's `on: release`
  # trigger, so the store build+submit is chained here too. `secrets: inherit`
  # passes the EXPO/App Store/Play Store secrets the build needs. Gated on
  # mobile-changed so a release with no meaningful mobile change doesn't
  # trigger a real store submission.
  build-mobile:
    needs: [release-please, mobile-changed]
    if: ${{ needs.release-please.outputs.release_created == 'true' && needs.mobile-changed.outputs.changed == 'true' }}
    permissions:
      contents: read
    secrets: inherit
    uses: ./.github/workflows/mobile-build.yml
    with:
      tag_name: ${{ needs.release-please.outputs.tag_name }}

  # Rewrite the GitHub Release body into human-readable notes (highlights +
  # breaking changes) using GitHub Models — authenticated by the workflow's
  # own GITHUB_TOKEN via the `models: read` permission, no extra secrets.
  # Only the Release body is touched; CHANGELOG.md stays release-please's.
  # Best-effort: if the model call fails, the release keeps the standard
  # auto-generated notes and the run still succeeds.
  enhance-release-notes:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    steps:
      - name: Fetch generated release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release view "$TAG_NAME" -R "$GITHUB_REPOSITORY" \
            --json body --jq .body > release-notes.md
          {
            echo "Rewrite these auto-generated release notes for Famlin $TAG_NAME:"
            echo
            cat release-notes.md
          } > prompt.md

      - name: Generate human-readable notes
        id: ai
        continue-on-error: true
        uses: actions/ai-inference@v2
        with:
          prompt-file: prompt.md
          max-completion-tokens: '1500'
          system-prompt: >-
            You rewrite auto-generated conventional-commit release notes for
            Famlin, a self-hosted family updates app. The audience is
            self-hosting admins and the families using the app. Produce
            concise GitHub-flavored markdown: a 1-3 sentence summary of the
            release, then a "### ✨ Highlights" list describing user-facing
            features and fixes in plain language, and a
            "### ⚠️ Breaking changes" section ONLY if the input contains
            breaking changes, stating what an admin must do when upgrading.
            Skip internal chores, refactors, and dependency bumps unless they
            affect operators. Preserve any PR/issue links like (#123) on the
            items you keep. Output raw markdown only — no code fences, and do
            not repeat the version heading.

      - name: Update release notes
        if: steps.ai.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          RESPONSE_FILE: ${{ steps.ai.outputs.response-file }}
        run: |
          {
            cat "$RESPONSE_FILE"
            echo
            echo "---"
            echo
            echo "<details><summary>Full changelog (auto-generated)</summary>"
            echo
            cat release-notes.md
            echo
            echo "</details>"
          } > final-notes.md
          gh release edit "$TAG_NAME" -R "$GITHUB_REPOSITORY" --notes-file final-notes.md
