name: Mobile build

# Store builds are chained from release-please.yml via workflow_call — the
# `on: release` event does NOT fire for release-please's GITHUB_TOKEN-created
# release (GitHub suppresses workflow-triggered-workflow events), same as
# docker-publish.yml. `on: release` is kept only for manually-published
# releases; workflow_dispatch runs a manual build without store submission
# unless the production profile is chosen with a release event.
on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag_name:
        description: Release tag to build (e.g. v1.2.3). Omit to build the calling ref.
        type: string
        required: false
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options: [all, ios, android]
      profile:
        description: EAS build profile (see mobile/eas.json)
        required: true
        default: preview
        type: choice
        options: [production, preview, development]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # When chained from release-please, build the released tag; empty
          # means the triggering ref (release tag / dispatched branch).
          ref: ${{ inputs.tag_name || '' }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      # Last gate before the store build: a native dep whose version drifts
      # from expo/bundledNativeModules.json makes Expo mix precompiled and
      # source-built frameworks, which crashes at launch only in the released
      # binary (the worklets 0.10.2 / RNWorklets dyld incident). Fail the
      # release here rather than shipping it.
      - name: Check dependency versions match the Expo SDK
        working-directory: mobile
        run: npx expo install --check

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Release builds go straight to the App Store / Play Store, which needs
      # store credentials on disk for `eas submit` (referenced via eas.json's
      # $ASC_API_KEY_PATH / $GOOGLE_SERVICE_ACCOUNT_KEY_PATH env-var fields).
      # A "release run" is either a published-release event or the
      # workflow_call chain from release-please — i.e. anything that isn't a
      # manual workflow_dispatch (a called workflow inherits the caller's
      # event_name, `push` here).
      - name: Write store submission credentials
        if: github.event_name != 'workflow_dispatch'
        working-directory: mobile
        run: |
          mkdir -p secrets
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | base64 -d > secrets/AuthKey.p8
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_KEY_BASE64 }}" | base64 -d > secrets/google-play.json

      - name: Build (manual run)
        if: github.event_name == 'workflow_dispatch'
        working-directory: mobile
        run: |
          eas build \
            --platform ${{ inputs.platform }} \
            --profile ${{ inputs.profile }} \
            --non-interactive \
            --no-wait

      - name: Build and submit to stores (release)
        if: github.event_name != 'workflow_dispatch'
        working-directory: mobile
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ASC_API_KEY_PATH: secrets/AuthKey.p8
          GOOGLE_SERVICE_ACCOUNT_KEY_PATH: secrets/google-play.json
        run: |
          eas build \
            --platform all \
            --profile production \
            --non-interactive \
            --auto-submit

      - name: Clean up store credentials
        if: always() && github.event_name != 'workflow_dispatch'
        working-directory: mobile
        run: rm -rf secrets
