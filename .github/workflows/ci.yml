name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mobile:
              - 'mobile/**'
              - 'packages/api-client/**'
              - 'package.json'
              - 'package-lock.json'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            backend/admin/package-lock.json
            mobile/package-lock.json
      # web + packages/api-client are root workspace members. This also
      # builds @famlin/api-client, which backend/admin's and mobile's
      # installs below need for their `file:` dependency — see the same
      # ordering note on the admin/mobile jobs further down.
      - name: Install workspace dependencies (builds @famlin/api-client)
        run: npm ci
      - name: Lint shared API client
        working-directory: packages/api-client
        run: npm run lint
      - name: Lint web app
        working-directory: web
        run: npm run lint
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Lint backend
        working-directory: backend
        run: npm run lint
      - name: Install admin dependencies
        working-directory: backend/admin
        run: npm ci
      - name: Lint admin UI
        working-directory: backend/admin
        run: npm run lint
      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci
      - name: Lint mobile app
        working-directory: mobile
        run: npm run lint

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: famlin
          POSTGRES_PASSWORD: famlin
          POSTGRES_DB: famlin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U famlin -d famlin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://famlin:famlin@localhost:5432/famlin_test?schema=public
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Typecheck
        working-directory: backend
        run: npx tsc --noEmit
      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy
      - name: Test
        working-directory: backend
        run: npx vitest run --passWithNoTests

  admin:
    name: Admin UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/admin/package-lock.json
      # admin depends on @famlin/api-client via file:../../packages/api-client.
      # That package's own dependencies (axios, etc.) are only installed by
      # the root workspace install — see the same pattern in the mobile job
      # below — so it must run before admin's install, here and on any fresh
      # checkout.
      - name: Install workspace dependencies (builds @famlin/api-client)
        run: npm ci
      - name: Install dependencies
        working-directory: backend/admin
        run: npm ci
      - name: Typecheck
        working-directory: backend/admin
        run: npx tsc --noEmit
      - name: Build
        working-directory: backend/admin
        run: npm run build

  mobile:
    name: Mobile
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mobile/package-lock.json
      # mobile depends on @famlin/api-client via file:../packages/api-client.
      # Its `prepare` (tsc) script needs the package's devDependencies, which
      # only the root workspace install provides — so the root install must
      # run before mobile's, here and on any fresh checkout.
      - name: Install workspace dependencies (builds @famlin/api-client)
        run: npm ci
      - name: Install dependencies
        working-directory: mobile
        run: npm ci
      # tsc/Jest/Metro all pass when a native module is only transitively
      # installed (npm auto-installs peer deps), but RN autolinking only links
      # native code for *direct* dependencies — the app then aborts at launch
      # with dyld "Library not loaded" (the RNWorklets/Reanimated 4 incident
      # this guards against).
      - name: Check native peer dependencies are direct
        working-directory: mobile
        run: node scripts/check-native-peer-deps.mjs
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Test
        working-directory: mobile
        run: npm test
      # tsc/Jest both resolve modules more leniently than Metro does at EAS
      # build time (see the tslib/@famlin/api-client incident this guards
      # against) — `expo export` runs the same Metro bundling step EAS build
      # does (`expo export:embed`) without needing macOS/Xcode, so it catches
      # bundler-only resolution failures on every PR instead of only at
      # release time.
      - name: Verify Metro bundle (iOS)
        working-directory: mobile
        run: npx expo export --platform ios --output-dir /tmp/expo-export-ios
      - name: Verify Metro bundle (Android)
        working-directory: mobile
        run: npx expo export --platform android --output-dir /tmp/expo-export-android

  web:
    name: Web app & shared API client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install workspace dependencies
        run: npm ci
      - name: Typecheck shared API client
        working-directory: packages/api-client
        run: npx tsc --noEmit
      - name: Test shared API client
        working-directory: packages/api-client
        run: npx vitest run
      - name: Typecheck web app
        working-directory: web
        run: npx tsc --noEmit
      - name: Test web app
        working-directory: web
        run: npx vitest run
      - name: Build web app
        run: npm run build --workspace=web

  docs:
    name: Docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install dependencies
        working-directory: docs
        run: npm ci
      - name: Typecheck
        working-directory: docs
        run: npm run typecheck
      - name: Build
        working-directory: docs
        run: npm run build

  # Guardrail for unmarked breaking changes: when a PR changes the OpenAPI
  # spec in a way oasdiff classifies as breaking, at least one commit in the
  # PR (or the PR title, which becomes the commit on squash-merge) must be
  # marked in conventional-commit breaking form — `feat!:` / `fix(scope)!:`
  # or a `BREAKING CHANGE:` footer. That marker is what release-please turns
  # into the "⚠ BREAKING CHANGES" changelog section and version bump, and
  # what the release-notes rewrite uses to warn self-hosting admins — an
  # unmarked breaking change ships silently as a minor entry.
  api-breaking-changes:
    name: API breaking-change check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      SPEC: docs/openapi/famlin.yaml
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compare spec against base and require a breaking marker
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          BASE_SHA=$(git merge-base "origin/$BASE_REF" HEAD)
          if git diff --quiet "$BASE_SHA" HEAD -- "$SPEC"; then
            echo "OpenAPI spec unchanged — nothing to check."
            exit 0
          fi
          if ! git show "$BASE_SHA:$SPEC" > /tmp/base-spec.yaml 2>/dev/null; then
            echo "Spec does not exist on the base branch — nothing to compare against."
            exit 0
          fi
          mkdir -p /tmp/specs
          mv /tmp/base-spec.yaml /tmp/specs/base.yaml
          cp "$SPEC" /tmp/specs/head.yaml
          set +e
          OUTPUT=$(docker run --rm -v /tmp/specs:/specs:ro tufin/oasdiff \
            breaking /specs/base.yaml /specs/head.yaml --fail-on ERR 2>&1)
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "Spec changed, but no breaking API changes detected."
            exit 0
          fi
          echo "$OUTPUT"
          {
            echo "## ⚠️ Breaking API changes detected in \`$SPEC\`"
            echo '```'
            echo "$OUTPUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          MARKER='^[[:alnum:]]+(\([^)]*\))?!:|BREAKING[- ]CHANGE:'
          if git log --format='%s%n%b' "$BASE_SHA"..HEAD | grep -qE "$MARKER"; then
            echo "A commit in this PR is marked as breaking — OK."
            exit 0
          fi
          if printf '%s' "$PR_TITLE" | grep -qE "$MARKER"; then
            echo "The PR title is marked as breaking — OK."
            exit 0
          fi
          echo "::error::$SPEC has breaking API changes (see the job summary), but no commit or PR title carries a conventional-commit breaking marker. Mark it with a '!' after the type (e.g. 'feat!: ...') or add a 'BREAKING CHANGE: <what an admin must do when upgrading>' footer, so release-please surfaces it in the release's breaking-changes section."
          exit 1

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          # Repo-root context: the image also bundles web/ + packages/ — see
          # backend/Dockerfile.
          context: .
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
