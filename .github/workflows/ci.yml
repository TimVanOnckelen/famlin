name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: famlin
          POSTGRES_PASSWORD: famlin
          POSTGRES_DB: famlin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U famlin -d famlin_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://famlin:famlin@localhost:5432/famlin_test?schema=public
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Typecheck
        working-directory: backend
        run: npx tsc --noEmit
      - name: Apply migrations
        working-directory: backend
        run: npx prisma migrate deploy
      - name: Test
        working-directory: backend
        run: npx vitest run --passWithNoTests

  admin:
    name: Admin UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/admin/package-lock.json
      - name: Install dependencies
        working-directory: backend/admin
        run: npm ci
      - name: Typecheck
        working-directory: backend/admin
        run: npx tsc --noEmit
      - name: Build
        working-directory: backend/admin
        run: npm run build

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - name: Install dependencies
        working-directory: mobile
        run: npm ci
      - name: Typecheck
        working-directory: mobile
        run: npx tsc --noEmit
      - name: Test
        working-directory: mobile
        run: npm test

  docs:
    name: Docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - name: Install dependencies
        working-directory: docs
        run: npm ci
      - name: Typecheck
        working-directory: docs
        run: npm run typecheck
      - name: Build
        working-directory: docs
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
