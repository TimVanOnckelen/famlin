# Demo instance: a single-container Famlin deployment with demo data and
# read-only mode enabled, fronted by Caddy for automatic HTTPS on
# demo.famlin.app. Intended for a small VM (Oracle Cloud Always Free,
# GCP e2-micro, or any other small Docker host).
#
# Usage on the demo server:
#   docker compose -f docker-compose.demo.yml pull
#   docker compose -f docker-compose.demo.yml up -d
#
# Caddyfile.demo (copied alongside this file as ./Caddyfile.demo) must be
# present on the server; Caddy needs ports 80/443 reachable from the internet
# and demo.famlin.app's DNS pointed at this host to issue a Let's Encrypt cert.
#
# The backend image is built and pushed as ghcr.io/timvanonckelen/famlin:demo
# by .github/workflows/demo.yml.

services:
  famlin-db:
    image: postgres:16-alpine
    container_name: famlin-demo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: famlin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: famlin
    volumes:
      - famlin-demo-db-data:/var/lib/postgresql/data
    # Tuned for a small 1 GB VM. Remove or adjust these if you have more RAM.
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U famlin -d famlin"]
      interval: 5s
      timeout: 5s
      retries: 5

  famlin-backend:
    image: ghcr.io/timvanonckelen/famlin:demo
    container_name: famlin-demo-backend
    restart: unless-stopped
    depends_on:
      famlin-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://famlin:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@famlin-db:5432/famlin?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      # Caddy is always in front of this instance, so requests always carry
      # X-Forwarded-* headers correctly.
      TRUST_PROXY: "true"
      READ_ONLY: "true"
    volumes:
      - famlin-demo-uploads:/app/uploads
    # No host port publish: only Caddy is exposed to the internet, reaching
    # this container over the compose network by service name.
    # Run migrations, seed demo data once, then start the server.
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node dist/prisma/seed.js &&
        node dist/server.js
      "

  caddy:
    image: caddy:2-alpine
    container_name: famlin-demo-caddy
    restart: unless-stopped
    depends_on:
      - famlin-backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.demo:/etc/caddy/Caddyfile:ro
      - famlin-demo-caddy-data:/data
      - famlin-demo-caddy-config:/config

volumes:
  famlin-demo-db-data:
  famlin-demo-uploads:
  famlin-demo-caddy-data:
  famlin-demo-caddy-config:
