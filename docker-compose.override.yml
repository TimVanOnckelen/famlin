# Local development overlay — automatically merged by `docker compose up`.
# Runs the backend with hot-reload (`nodemon`, see backend/nodemon.json)
# against the bind-mounted source, so saving a file in ./backend restarts the
# server inside the container. nodemon also watches prisma/schema.prisma and
# prisma/migrations/, rerunning `db:deploy && db:generate` before restarting
# the server whenever either changes — so a new migration (your own, or one
# that appeared via `git pull` while the container was already running) is
# applied and its Prisma Client regenerated automatically, no manual
# `prisma generate` + container restart required. The admin UI
# (backend/admin) is rebuilt to dist/admin on every change too via
# `vite build --watch` — a browser refresh (no `docker compose up --build`)
# is enough to see admin edits.
#
# docker-compose.yml pulls the published ghcr.io image by default; this overlay
# adds a `build:` block (only needed here, for contributors working from a
# checkout) that takes precedence over `image:` whenever `--build` is used.
#
# This file is NOT used in production: on Synology you deploy only
# docker-compose.yml (e.g. `docker compose -f docker-compose.yml up -d`).
services:
  famlin-backend:
    build:
      # Context is the repo root (not ./backend): the image also bundles the
      # member-facing web app (web/ + packages/api-client), which lives
      # outside backend/ — see backend/Dockerfile. The dev `base` target
      # doesn't build web; use `npm run dev:web` on the host for web dev
      # (Vite dev server proxying /api to this container).
      context: .
      dockerfile: backend/Dockerfile
      target: base
    environment:
      NODE_ENV: development
      # Uncomment if file changes are not detected on your platform
      # (some macOS/Windows Docker setups need polling for bind-mount watches):
      # CHOKIDAR_USEPOLLING: "true"
    # migrate + seed once, start the admin watch-build in the background, then
    # hand off to nodemon (npm run dev), which takes over migrate+generate on
    # every subsequent schema/migration change and restarts on src/ changes.
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npm run db:seed &&
        (cd admin && npx vite build --watch &) &&
        npm run dev
      "
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
      - /app/admin/node_modules
      # The member-facing web app builds on the HOST (it needs the root npm
      # workspace, which isn't mounted into this container) into
      # backend/dist/web — this more-specific bind punches through the
      # anonymous /app/dist volume above so the dev backend serves it at /.
      # Run `npm run build:web` (once) or `npm run watch:web` (rebuild on
      # change) from the repo root; the backend must (re)start after the
      # first build to pick it up.
      - ./backend/dist/web:/app/dist/web
