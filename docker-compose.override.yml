# Local development overlay — automatically merged by `docker compose up`.
# Runs the backend with hot-reload (`tsx watch`) against the bind-mounted source,
# so saving a file in ./backend restarts the server inside the container. The
# admin UI (backend/admin) is rebuilt to dist/admin on every change too via
# `vite build --watch` — a browser refresh (no `docker compose up --build`)
# is enough to see admin edits.
#
# docker-compose.yml pulls the published ghcr.io image by default; this overlay
# adds a `build:` block (only needed here, for contributors working from a
# checkout) that takes precedence over `image:` whenever `--build` is used.
#
# This file is NOT used in production: on Synology you deploy only
# docker-compose.yml (e.g. `docker compose -f docker-compose.yml up -d`).
services:
  famlin-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: base
    environment:
      NODE_ENV: development
      # Uncomment if file changes are not detected on your platform
      # (some macOS/Windows Docker setups need polling for bind-mount watches):
      # CHOKIDAR_USEPOLLING: "true"
    # migrate + seed once, start the admin watch-build in the background, then
    # watch src/ and restart on change (npm run dev = tsx watch).
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npm run db:seed &&
        (cd admin && npx vite build --watch &) &&
        npm run dev
      "
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
      - /app/admin/node_modules
